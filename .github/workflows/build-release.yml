name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release Disbox (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools fakeroot

      - name: Install NPM Dependencies
        run: npm install

      - name: Rebuild Native Modules (better-sqlite3)
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Build and Package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: Disbox v${{ steps.package-version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release/*.AppImage
            release/*.deb
            release/*.pacman
            release/*.exe
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Draft Release (on main push)
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: latest-dev
          name: Latest Development Build
          draft: true
          prerelease: true
          files: |
            release/*.AppImage
            release/*.deb
            release/*.pacman
            release/*.exe
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
