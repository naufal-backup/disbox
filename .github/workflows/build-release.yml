name: Build and Release v4

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools fakeroot rpm
          
      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run build:web

      - name: Package Linux
        run: npx electron-builder --linux --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            release/Disbox-Linux-x64.AppImage
            release/Disbox-Linux-x64.deb
            release/Disbox-Linux-x64.pacman

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run build:web

      - name: Package Windows
        run: npx electron-builder --win --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            release/Disbox-Windows-Setup.exe
            release/Disbox-Windows-Portable.exe
            release/Disbox-Windows.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Disbox v4.0.0
          body: |
            ## 🚀 Disbox v4.0.0 - Major Release
            
            Disbox v4 hadir dengan peningkatan performa signifikan dan fitur keamanan baru.
            
            ### ✨ Fitur Baru & Perbaikan:
            - **⚡ Fix Deadlock & Performance:** Perbaikan sistem antrean tugas yang mencegah aplikasi hang saat operasi file besar.
            - **🔒 Smart Sync:** Penanganan konflik metadata yang lebih cerdas untuk sinkronisasi antar perangkat.
            - **🛠 Network Reliability:** Penambahan timeout pada request jaringan untuk stabilitas lebih baik.
            - **📁 Operasi Bulk:** Optimasi pemindahan dan penyalinan file dalam jumlah banyak.
            
            ### 📦 Artifacts Terlampir:
            1. **Disbox-Linux-x64.AppImage** (Portable Linux)
            2. **Disbox-Linux-x64.deb** (Debian/Ubuntu)
            3. **Disbox-Linux-x64.pacman** (Arch Linux)
            4. **Disbox-Windows-Setup.exe** (Windows Installer)
            5. **Disbox-Windows-Portable.exe** (Windows Portable)
            6. **Disbox-Windows.zip** (Windows Archive)
          files: |
            release/Disbox-Linux-x64.AppImage
            release/Disbox-Linux-x64.deb
            release/Disbox-Linux-x64.pacman
            release/Disbox-Windows-Setup.exe
            release/Disbox-Windows-Portable.exe
            release/Disbox-Windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
