name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release Disbox
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install System Dependencies
        # Wine is required to build Windows NSIS/exe on Linux
        # libarchive-tools is needed for pacman packaging
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine64 wine32 libarchive-tools fakeroot
          
      - name: Install NPM Dependencies
        run: npm ci || npm install

      - name: Rebuild Native Modules (better-sqlite3)
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build Web Assets (Vite)
        run: npm run build:web

      - name: Build Linux Artifacts (AppImage, deb, pacman)
        run: npx electron-builder --linux --publish never

      - name: Build Windows Artifacts (Setup, Portable, zip)
        run: npx electron-builder --win --publish never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: Disbox v${{ steps.package-version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release/Disbox-Linux-x64.AppImage
            release/Disbox-Linux-x64.deb
            release/Disbox-Linux-x64.pacman
            release/Disbox-Windows-Setup.exe
            release/Disbox-Windows-Portable.exe
            release/Disbox-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
